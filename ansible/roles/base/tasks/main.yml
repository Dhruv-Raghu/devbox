---
- name: Refresh APT metadata and install declared base packages
  become: true
  ansible.builtin.apt:
    name: "{{ base_apt_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure OpenSSH is enabled and running
  become: true
  ansible.builtin.systemd:
    name: ssh
    enabled: true
    state: started

- name: Create managed guest configuration directories
  ansible.builtin.file:
    path: "{{ devbox_guest_home }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - .local/share
    - .local/bin
