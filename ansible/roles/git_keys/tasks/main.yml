---
- name: Create secure SSH directory
  ansible.builtin.file:
    path: "{{ devbox_guest_home }}/.ssh"
    state: directory
    mode: '0700'
- name: Discover controller-managed outbound SSH files
  ansible.builtin.set_fact:
    devbox_ssh_secret_files: >-
      {{ query('ansible.builtin.fileglob', playbook_dir + '/../../.secrets/ssh/*') }}

- name: Require at least one controller-managed SSH file
  ansible.builtin.assert:
    that:
      - devbox_ssh_secret_files | length > 0
    fail_msg: >-
      Add the SSH config and any outbound key files under .secrets/ssh/ on the
      controller before provisioning.

- name: Deploy all controller-managed outbound SSH files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ devbox_guest_home }}/.ssh/{{ item | basename }}"
    mode: "{{ '0644' if (item | basename).endswith('.pub') else '0600' }}"
  loop: "{{ devbox_ssh_secret_files }}"
  loop_control:
    label: "{{ item | basename }}"
  no_log: true

- name: Install GitHub's published SSH host keys
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../files/github_known_hosts"
    dest: "{{ devbox_guest_home }}/.ssh/known_hosts"
    mode: '0644'

- name: Verify the dedicated Git SSH identity authenticates to GitHub
  ansible.builtin.command: ssh -o BatchMode=yes -T git@github-dhruv
  register: devbox_github_ssh
  changed_when: false
  failed_when: >-
    devbox_github_ssh.rc != 1 or
    'successfully authenticated' not in (devbox_github_ssh.stdout ~ devbox_github_ssh.stderr)
